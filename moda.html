<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f6d5df;
}

/* BOTÓN VOLVER */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
}

.back-btn {
    background: #e63973;
    color: white;
    padding: 12px 25px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 15px rgba(230, 57, 115, 0.3);
    transition: 0.3s;
}

.back-btn:hover {
    background: #c2185b;
    transform: translateX(-5px);
}

/* CONTENEDOR PRINCIPAL */
.wrapper {
    width: 95%;
    max-width: 1400px;
    margin: 40px auto;
    background: #fff;
    border-radius: 20px;
    padding: 30px;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 15px;
}

.logo {
    font-size: 28px;
    font-weight: 700;
    color: #e63973;
}

.cart-box {
    position: relative;
}

.cart {
    background: #e63973;
    color: #fff;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
}

.cart-dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: #fff;
    width: 300px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    padding: 15px;
    z-index: 100;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
}

.cart-item button {
    background: none;
    border: none;
    color: red;
    cursor: pointer;
    font-size: 12px;
}

/* BUSCADOR */
.search-container {
    grid-column: 1/-1;
    margin-bottom: 20px;
}

.search-box {
    display: flex;
    gap: 10px;
    max-width: 600px;
    margin: 0 auto;
}

.search-input {
    flex: 1;
    padding: 15px 20px;
    border: 2px solid #f0f0f0;
    border-radius: 30px;
    font-size: 16px;
    transition: 0.3s;
}

.search-input:focus {
    outline: none;
    border-color: #e63973;
}

.search-btn {
    background: #e63973;
    color: white;
    border: none;
    padding: 0 30px;
    border-radius: 30px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    font-size: 16px;
}

.search-btn:hover {
    background: #c2185b;
}

/* HERO */
.hero {
    background: linear-gradient(135deg, #ff8fab, #ff4d6d);
    padding: 40px;
    border-radius: 20px;
    color: #fff;
    margin-bottom: 30px;
    text-align: center;
}

.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 18px;
    opacity: 0.9;
}

/* SECCIÓN */
.section {
    margin-bottom: 50px;
}

.section h2 {
    margin-bottom: 20px;
    color: #e63973;
    font-size: 28px;
    border-left: 5px solid #e63973;
    padding-left: 15px;
}

/* CONTADOR DE RESULTADOS */
.results-count {
    text-align: center;
    margin-bottom: 20px;
    color: #666;
    font-size: 16px;
}

.results-count span {
    font-weight: 600;
    color: #e63973;
}

/* PRODUCTOS - OPTIMIZADO */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.card {
    background: #fafafa;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(230, 57, 115, 0.15);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    content-visibility: auto;
    contain-intrinsic-size: 200px;
}

.price {
    font-weight: 700;
    font-size: 18px;
    margin: 10px 0;
    color: #e63973;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: #e63973;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
    width: 100%;
}

.btn:hover {
    background: #c2185b;
}

/* MENSAJE SIN RESULTADOS */
.no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 50px;
    background: #f8f8f8;
    border-radius: 20px;
    color: #666;
}

.no-results i {
    font-size: 50px;
    color: #e63973;
    margin-bottom: 20px;
}

.no-results h3 {
    font-size: 24px;
    margin-bottom: 10px;
    color: #333;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #ff8fab;
    color: #fff;
    border-radius: 15px;
    margin-top: 20px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .wrapper { padding: 20px; }

    .search-box { flex-direction: column; }
    .search-btn { padding: 15px; }

@media (max-width: 480px) {

    justify-content: center;
    align-items: center;

.modal-content {

    align-items: center;

#modalImg {

.prev, .next {

    height: 55px;
    display: flex;
    justify-content: center;
    align-items: center;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(6px);
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
}

#imageModal:hover .prev,
#imageModal:hover .next {
    opacity: 1;
}

.prev { left: 60px; }
.next { right: 60px; }

.prev:hover, .next:hover {
    background: white;
    color: black;
    transform: translateY(-50%) scale(1.1);
}

.close-modal {

    top: 40px;
    right: 60px;
    font-size: 22px;
    width: 45px;
    height: 45px;
    border-radius: 50%;

.close-modal:hover {

    color: black;

.indicators {

    bottom: -50px;
    left: 50%;
    transform: translateX(-50%);

.indicators span {

// ==================== VARIABLES GLOBALES ====================
let cart = [];
let currentImagesList = [];
let currentImageIndex = 0;
let currentProduct = null;

// ==================== FUNCIONES DEL CARRITO ====================
function updateCart() {
    let cartCount = 0;
    let cartTotal = 0;
    let cartItemsHTML = "";

    cart.forEach((item, index) => {
        cartCount += item.qty;
        cartTotal += item.price * item.qty;
        cartItemsHTML += `<div class="cart-item">${item.name} x${item.qty} <button class="remove-item" data-index="${index}">❌</button></div>`;
    });

    document.getElementById("cart-count").innerText = cartCount;
    document.getElementById("cart-total").innerText = cartTotal.toLocaleString();
    document.getElementById("dropdown-total").innerText = cartTotal.toLocaleString();
    document.getElementById("cart-items").innerHTML = cartItemsHTML || "Carrito vacío";
    localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price) {
    let existing = cart.find(item => item.name === name);
    if (existing) {
        existing.qty++;
    } else {
        cart.push({ name, price, qty: 1 });
    }
    updateCart();
}

function removeFromCart(index) {
    cart.splice(index, 1);
    updateCart();
}

// ==================== RENDERIZADO DE PRODUCTOS ====================
function renderProducts(productsToShow = productsData) {
    const container = document.getElementById("productos-moda");
    container.innerHTML = productsToShow.map(product => `

            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200?text=${encodeURIComponent(product.name)}'">
            <h4>${product.name}</h4>
            <div class="price">$${product.price.toLocaleString()}</div>
            <button class="btn add-to-cart">Agregar al carrito</button>
        </div>
    `).join("");
    
    document.getElementById("totalCount").innerText = productsToShow.length;
    document.getElementById("visibleCount").innerText = productsToShow.length;
}

// ==================== BÚSQUEDA ====================
function searchProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = productsData.filter(product => product.name.toLowerCase().includes(searchTerm));
    
    renderProducts(filtered);
    
    const container = document.getElementById("productos-moda");
    let noResultsMsg = document.getElementById('noResultsMsg');
    
    if (filtered.length === 0 && searchTerm !== '') {
        if (!noResultsMsg) {
            noResultsMsg = document.createElement('div');
            noResultsMsg.id = 'noResultsMsg';
            noResultsMsg.className = 'no-results';
            noResultsMsg.innerHTML = `<i class="fas fa-search"></i><h3>No se encontraron productos</h3><p>No hay productos que coincidan con "${searchTerm}"</p>`;
            container.appendChild(noResultsMsg);
        }
    } else if (noResultsMsg) {
        noResultsMsg.remove();
    }
}

// ==================== MODALES ====================
function openProductModal(card) {
    currentProduct = {
        name: card.dataset.name,
        price: parseInt(card.dataset.price),
        description: card.dataset.description,
        image: card.querySelector("img").src,
        images: JSON.parse(card.dataset.images || '[]')
    };
    
    document.getElementById("modal-image").src = currentProduct.image;
    document.getElementById("modal-name").innerText = currentProduct.name;
    document.getElementById("modal-description").innerText = currentProduct.description;
    document.getElementById("modal-price").innerText = currentProduct.price.toLocaleString();
    document.getElementById("productModal").style.display = "flex";
}

function openImageModal(images, startIndex = 0) {
    if (!images || images.length === 0) return;
    currentImagesList = images;
    currentImageIndex = startIndex;
    
    const modalImg = document.getElementById("modalImg");
    modalImg.src = currentImagesList[currentImageIndex];
    
    updateIndicators();
    document.getElementById("imageModal").style.display = "flex";
}

function updateIndicators() {
    const indicatorsContainer = document.querySelector(".indicators");
    indicatorsContainer.innerHTML = currentImagesList.map((_, idx) => 
        `<span class="${idx === currentImageIndex ? 'active' : ''}" data-index="${idx}"></span>`
    ).join("");
    
    document.querySelectorAll(".indicators span").forEach(dot => {
        dot.addEventListener("click", (e) => {
            currentImageIndex = parseInt(e.target.dataset.index);
            document.getElementById("modalImg").src = currentImagesList[currentImageIndex];
            updateIndicators();
        });
    });
}

function nextImage() {
    currentImageIndex = (currentImageIndex + 1) % currentImagesList.length;
    document.getElementById("modalImg").src = currentImagesList[currentImageIndex];
    updateIndicators();
}

function prevImage() {
    currentImageIndex = (currentImageIndex - 1 + currentImagesList.length) % currentImagesList.length;
    document.getElementById("modalImg").src = currentImagesList[currentImageIndex];
    updateIndicators();
}

// ==================== EVENT DELEGATION (SIN LAG) ====================
document.addEventListener("DOMContentLoaded", function() {
    const savedCart = localStorage.getItem("cart");
    if (savedCart) cart = JSON.parse(savedCart);
    
    renderProducts();
    updateCart();
    
    // Event delegation
    document.body.addEventListener("click", (e) => {
        if (e.target.classList.contains("add-to-cart")) {
            e.stopPropagation();
            const card = e.target.closest(".card");
            addToCart(card.dataset.name, parseInt(card.dataset.price));
            return;
        }
        
        if (e.target.closest(".card") && !e.target.classList.contains("add-to-cart") && e.target.tagName !== "IMG") {
            const card = e.target.closest(".card");
            openProductModal(card);
            return;
        }
        
        if (e.target.tagName === "IMG" && e.target.closest(".card")) {
            e.stopPropagation();
            const card = e.target.closest(".card");
            const images = JSON.parse(card.dataset.images || '[]');
            const currentImgSrc = e.target.src;
            const startIndex = images.findIndex(img => currentImgSrc.includes(img)) || 0;
            openImageModal(images.length ? images : [currentImgSrc], startIndex >= 0 ? startIndex : 0);
            return;
        }
        
        if (e.target.classList.contains("remove-item")) {
            removeFromCart(parseInt(e.target.dataset.index));
            return;
        }
        
        if (e.target.id === "cartBtn" || e.target.closest("#cartBtn")) {
            const dropdown = document.getElementById("cart-dropdown");
            dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
            return;
        }
        
        if (e.target.id === "checkoutBtn") {
            if (cart.length === 0) {
                alert("Tu carrito está vacío");
                return;
            }
            let mensaje = "🛒 *Nuevo Pedido J&M STORE*\n\n";
            let total = 0;
            cart.forEach(item => {
                mensaje += `• ${item.name} x${item.qty} = $${(item.price * item.qty).toLocaleString()}\n`;
                total += item.price * item.qty;
            });
            mensaje += `\n💰 *Total:* $${total.toLocaleString()}\n\n👤 Nombre:\n📍 Dirección:\n📞 Teléfono:`;
            window.open("https://wa.me/573213850020?text=" + encodeURIComponent(mensaje), "_blank");
            return;
        }
    });
    
    // Cerrar modales
    document.querySelector(".close-product")?.addEventListener("click", () => {
        document.getElementById("productModal").style.display = "none";
    });
    
    document.querySelector(".close-modal")?.addEventListener("click", () => {
        document.getElementById("imageModal").style.display = "none";
    });
    
    document.querySelector(".prev")?.addEventListener("click", prevImage);
    document.querySelector(".next")?.addEventListener("click", nextImage);
    
    document.getElementById("modal-add")?.addEventListener("click", () => {
        if (currentProduct) {
            addToCart(currentProduct.name, currentProduct.price);
            document.getElementById("productModal").style.display = "none";
        }
    });
    
    document.getElementById("searchBtn")?.addEventListener("click", searchProducts);
    document.getElementById("searchInput")?.addEventListener("input", searchProducts);
    document.getElementById("searchInput")?.addEventListener("keypress", (e) => {
        if (e.key === "Enter") searchProducts();
    });
    
    document.getElementById("productModal")?.addEventListener("click", (e) => {
        if (e.target === document.getElementById("productModal")) {
            document.getElementById("productModal").style.display = "none";
        }
    });
    
    document.getElementById("imageModal")?.addEventListener("click", (e) => {
        if (e.target === document.getElementById("imageModal")) {
            document.getElementById("imageModal").style.display = "none";
        }
    });
    
    document.addEventListener("click", (e) => {
        const cartBox = document.querySelector(".cart-box");
        const dropdown = document.getElementById("cart-dropdown");
        if (cartBox && !cartBox.contains(e.target) && dropdown.style.display === "block") {
            dropdown.style.display = "none";
        }
    });
});
</script>
</body>
